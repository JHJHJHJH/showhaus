services:
  api:
    build:
      context: ./apps/api
      target: development
    command: yarn start:dev
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
      MARTIN_BASE_URL: http://martin:3333
    volumes:
      - ./apps/api:/usr/src/app/backend
      - api_node_modules:/usr/src/app/backend/node_modules
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:8080/api || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - webnet

  frontend:
    build:
      context: ./apps/app
      target: development
    command: yarn start
    env_file:
      - ./apps/app/.env
    environment:
      HOST: 0.0.0.0
      PORT: 3210
      BROWSER: none
      CHOKIDAR_USEPOLLING: true
      REACT_APP_SHOWHOUSE_API_URL: http://localhost:8080/api
    volumes:
      - ./apps/app:/usr/src/app/frontend
      - frontend_node_modules:/usr/src/app/frontend/node_modules
    ports:
      - "3210:3210"
    depends_on:
      api:
        condition: service_started
    networks:
      - webnet

  martin:
    image: ghcr.io/maplibre/martin:1.9.0
    command: ["--config", "/config.yaml", "--webui", "enable-for-all"]
    restart: unless-stopped
    ports:
      - "3333:3333"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:3333/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./apps/api/martin/config.yaml:/config.yaml:ro
    environment:
      MARTIN_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change_me_for_local_dev}@postgres_db:5432/${POSTGRES_DB:-showhouse_db}
    depends_on:
      api:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
    networks:
      - webnet

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_for_local_dev}
    ports:
      - "5051:80"
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - webnet

  postgres_db:
    image: postgis/postgis:17-3.5-alpine
    env_file:
      - ./apps/api/.env
    environment:
      PG_DATA: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - webnet

networks:
  webnet:

volumes:
  api_node_modules:
  frontend_node_modules:
  pgdata:
