services:
  main:
    container_name: main
    build:
      context: .
      target: development
    volumes:
      - .:/usr/src/app/backend
      - /usr/src/app/backend/node_modules
    ports:
      - 8080:8080
    command: yarn start:dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
      MARTIN_BASE_URL: http://martin:3333
    networks:
      - webnet
    depends_on:
      postgres_db:
        condition: service_healthy
  martin:
    container_name: martin
    image: ghcr.io/maplibre/martin:1.9.0
    command: ['--config', '/config.yaml', '--webui', 'enable-for-all']
    restart: unless-stopped
    ports:
      - 3333:3333
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider http://127.0.0.1:3333/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./martin/config.yaml:/config.yaml:ro
    environment:
      MARTIN_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
    networks:
      - webnet
    depends_on:
      main:
        condition: service_started
      postgres_db:
        condition: service_healthy
  pgadmin:
    image: dpage/pgadmin4
    container_name: showhouse_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - webnet
  postgres_db:
    container_name: postgres_db
    image: postgis/postgis:17-3.5-alpine
    networks:
      - webnet
    env_file:
      - .env
    environment:
      PG_DATA: /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - 5433:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
networks:
  webnet:
volumes:
  pgdata:
