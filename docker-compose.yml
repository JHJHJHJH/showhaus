services:
  main:
    container_name: main
    build:
      context: .
      target: development
    volumes:
      - .:/usr/src/app/backend
      - /usr/src/app/backend/node_modules
    ports:
      - 8080:8080
    command: yarn start:dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_db
    networks:
      - webnet
    depends_on:
      postgres_db:
        condition: service_healthy
  postgres_db:
    container_name: postgres_db
    image: postgis/postgis:17-3.5-alpine
    networks:
      - webnet
    env_file:
      - .env
    environment:
      PG_DATA: /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
networks:
  webnet:
volumes:
  pgdata:
